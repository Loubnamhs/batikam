name: Build And Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      APP_NAME: BatikamRenove
      VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: pytest -q

      - name: Build Windows Package
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -Version "${env:VERSION_NAME}"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-${{ env.VERSION_NAME }}
          path: dist/release/${{ env.APP_NAME }}-Windows-${{ env.VERSION_NAME }}.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/${{ env.APP_NAME }}-Windows-${{ env.VERSION_NAME }}.zip
          generate_release_notes: true
